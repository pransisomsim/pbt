version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: pbtracker_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: budget_tracker_v1
      MYSQL_USER: pbtracker
      MYSQL_PASSWORD: pbtracker123
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./finance_tracker_schema.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: pbtracker_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: your-super-secret-jwt-key-change-this
      JWT_EXPIRES_IN: 7d
      DB_HOST: mariadb
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: budget_tracker_v1
    depends_on:
      - mariadb

  frontend:
    build: ./frontend
    container_name: pbtracker_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mariadb_data:
